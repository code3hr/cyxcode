name: cyxcode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  cyxcode:
    if: |
      contains(github.event.comment.body, ' /cc') ||
      startsWith(github.event.comment.body, '/cc') ||
      contains(github.event.comment.body, ' /cyxcode') ||
      startsWith(github.event.comment.body, '/cyxcode')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Run cyxcode
        uses: code3hr/cyxcode/github@latest
        env:
          CYXCODE_API_KEY: ${{ secrets.CYXCODE_API_KEY }}
          CYXCODE_PERMISSION: '{"bash": "deny"}'
        with:
          model: cyxcode/claude-opus-4-5
