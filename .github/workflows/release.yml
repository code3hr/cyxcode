name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: cyxwiz-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            artifact: cyxwiz-linux-arm64
          - os: macos-14
            target: darwin-x64
            artifact: cyxwiz-darwin-x64
          - os: macos-latest
            target: darwin-arm64
            artifact: cyxwiz-darwin-arm64
          - os: windows-latest
            target: windows-x64
            artifact: cyxwiz-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git fetch --force --tags

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        working-directory: packages/opencode
        run: bun run build --single
        env:
          OPENCODE_VERSION: ${{ github.ref_name }}

      - name: Package Linux/macOS Binary
        if: runner.os != 'Windows'
        run: |
          cd packages/opencode/dist
          DIST_DIR=$(ls -d */ | head -1)
          cd "$DIST_DIR/bin"
          chmod +x opencode
          mv opencode cyxwiz
          tar -czvf ${{ matrix.artifact }}.tar.gz cyxwiz
          mv ${{ matrix.artifact }}.tar.gz $GITHUB_WORKSPACE/

      - name: Package Windows Binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd packages/opencode/dist
          $distDir = Get-ChildItem -Directory | Select-Object -First 1
          cd "$($distDir.Name)/bin"
          Rename-Item opencode.exe cyxwiz.exe
          Compress-Archive -Path cyxwiz.exe -DestinationPath ${{ matrix.artifact }}.zip
          Move-Item ${{ matrix.artifact }}.zip $env:GITHUB_WORKSPACE/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.sha256
          cat checksums.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
