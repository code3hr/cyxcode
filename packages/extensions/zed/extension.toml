id = "cyxcode"
name = "CyxCode"
description = "AI-powered security operations platform."
version = "1.1.21"
schema_version = 1
authors = ["code3hr"]
repository = "https://github.com/code3hr/cyxcode"

[agent_servers.cyxcode]
name = "CyxCode"
icon = "./icons/cyxcode.svg"

[agent_servers.cyxcode.targets.darwin-aarch64]
archive = "https://github.com/code3hr/cyxcode/releases/download/v1.1.21/cyxcode-darwin-arm64.zip"
cmd = "./cyxcode"
args = ["acp"]

[agent_servers.cyxcode.targets.darwin-x86_64]
archive = "https://github.com/code3hr/cyxcode/releases/download/v1.1.21/cyxcode-darwin-x64.zip"
cmd = "./cyxcode"
args = ["acp"]

[agent_servers.cyxcode.targets.linux-aarch64]
archive = "https://github.com/code3hr/cyxcode/releases/download/v1.1.21/cyxcode-linux-arm64.tar.gz"
cmd = "./cyxcode"
args = ["acp"]

[agent_servers.cyxcode.targets.linux-x86_64]
archive = "https://github.com/code3hr/cyxcode/releases/download/v1.1.21/cyxcode-linux-x64.tar.gz"
cmd = "./cyxcode"
args = ["acp"]

[agent_servers.cyxcode.targets.windows-x86_64]
archive = "https://github.com/code3hr/cyxcode/releases/download/v1.1.21/cyxcode-windows-x64.zip"
